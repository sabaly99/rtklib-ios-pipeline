name: Build rnx2rtkp for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone RTKLIB_EX_2.5.0
        run: |
          git clone --depth=1 https://github.com/rtklibexplorer/RTKLIB.git rtklib
          cd rtklib
          git fetch --tags
          git checkout b34i
          echo "RTKLIB cloned successfully"

      - name: Show iOS SDK path
        run: |
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version

      - name: Patch out system() calls incompatible with iOS
        run: |
          python3 - << 'PYEOF'
          import re

          files = [
              "rtklib/src/download.c",
              "rtklib/src/rtkcmn.c",
          ]

          for path in files:
              with open(path, "r") as f:
                  content = f.read()
              patched = re.sub(r'return\s+system\s*\(\s*cmd\s*\)\s*;', 'return -1; /* system() unavailable on iOS */', content)
              with open(path, "w") as f:
                  f.write(patched)
              print(f"Patched {path}")
              for i, line in enumerate(patched.splitlines(), 1):
                  if "system" in line:
                      print(f"  line {i}: {line.strip()}")
          PYEOF

      - name: Compile rnx2rtkp for iOS ARM64
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SRC_DIR=rtklib/src
          MAIN_C=$(find rtklib -name "rnx2rtkp.c" | head -1)
          echo "Main source: $MAIN_C"

          # Only top-level src/*.c — rcv/ subdirectory excluded (not needed by rnx2rtkp)
          # Missing rcv/ symbols are satisfied by rcv_stubs.c in this repo
          TOP_SRC=$(find "$SRC_DIR" -maxdepth 1 -name "*.c" | tr '\n' ' ')

          clang \
            -target arm64-apple-ios14.0 \
            -isysroot "$SDK" \
            -O2 \
            -DENAGLO -DENAGAL -DENAQZS -DENACMP -DENAIRN \
            -I"$SRC_DIR" \
            -o rnx2rtkp \
            $TOP_SRC \
            rcv_stubs.c \
            "$MAIN_C" \
            -lm

          echo "Build complete"
          file rnx2rtkp
          ls -lh rnx2rtkp

      - name: Install ldid for signing
        run: brew install ldid

      - name: Sign binary for a-Shell
        run: |
          cat > entitlements.xml << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>platform-application</key>
            <true/>
            <key>com.apple.private.security.no-container</key>
            <true/>
          </dict>
          </plist>
          ENTEOF
          ldid -Sentitlements.xml rnx2rtkp
          echo "Signing complete"
          ldid -e rnx2rtkp

      - name: Upload iOS binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnx2rtkp-ios-arm64
          path: rnx2rtkp
          retention-days: 30
