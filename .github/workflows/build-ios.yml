name: Build rnx2rtkp for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone RTKLIB_EX_2.5.0
        run: |
          git clone --depth=1 https://github.com/rtklibexplorer/RTKLIB.git rtklib
          cd rtklib
          git fetch --tags
          git checkout b34i
          echo "RTKLIB cloned successfully"

      - name: Show iOS SDK path
        run: |
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version

      - name: Patch out system() calls incompatible with iOS
        run: |
          sed -i '' 's/return system(cmd);/return -1;/g' rtklib/src/download.c
          sed -i '' 's/return system(cmd);/return -1;/g' rtklib/src/rtkcmn.c
          echo "Patched successfully"

      - name: Create receiver stubs (replaces rcv/ drivers)
        run: |
          cat > rtklib/src/rcv_stubs.c << 'STUBS'
          /* Stub implementations for receiver drivers not needed by rnx2rtkp */
          #include "../src/rtklib.h"

          /* rcvraw.c stubs */
          int input_ubx (raw_t *r, unsigned char c) { return 0; }
          int input_ubxf(raw_t *r, FILE *f)          { return 0; }
          int input_oem4 (raw_t *r, unsigned char c) { return 0; }
          int input_oem4f(raw_t *r, FILE *f)          { return 0; }
          int input_nvs (raw_t *r, unsigned char c)  { return 0; }
          int input_nvsf(raw_t *r, FILE *f)           { return 0; }
          int input_stq (raw_t *r, unsigned char c)  { return 0; }
          int input_stqf(raw_t *r, FILE *f)           { return 0; }
          int input_javad (raw_t *r, unsigned char c){ return 0; }
          int input_javadf(raw_t *r, FILE *f)         { return 0; }
          int input_sbp (raw_t *r, unsigned char c)  { return 0; }
          int input_sbpf(raw_t *r, FILE *f)           { return 0; }
          int input_cres (raw_t *r, unsigned char c) { return 0; }
          int input_cresf(raw_t *r, FILE *f)          { return 0; }
          int input_sbf (raw_t *r, unsigned char c)  { return 0; }
          int input_sbff(raw_t *r, FILE *f)           { return 0; }
          int input_bnx (raw_t *r, unsigned char c)  { return 0; }
          int input_bnxf(raw_t *r, FILE *f)           { return 0; }
          int input_rt17 (raw_t *r, unsigned char c) { return 0; }
          int input_rt17f(raw_t *r, FILE *f)          { return 0; }
          int init_rt17(raw_t *r)  { return 0; }
          void free_rt17(raw_t *r) { return; }

          /* stream.c stubs */
          int gen_ubx(const char *msg, unsigned char *buff) { return 0; }
          int gen_stq(const char *msg, unsigned char *buff) { return 0; }
          int gen_nvs(const char *msg, unsigned char *buff) { return 0; }
          STUBS
          echo "Stubs created"
          cat rtklib/src/rcv_stubs.c

      - name: Compile rnx2rtkp for iOS ARM64
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SRC_DIR=rtklib/src
          MAIN_C=$(find rtklib -name "rnx2rtkp.c" | head -1)
          echo "Main source: $MAIN_C"

          TOP_SRC=$(find "$SRC_DIR" -maxdepth 1 -name "*.c" | tr '\n' ' ')

          clang \
            -target arm64-apple-ios14.0 \
            -isysroot "$SDK" \
            -O2 \
            -DENAGLO -DENAGAL -DENAQZS -DENACMP -DENAIRN \
            -I"$SRC_DIR" \
            -o rnx2rtkp \
            $TOP_SRC \
            "$SRC_DIR/rcv_stubs.c" \
            "$MAIN_C" \
            -lm

          echo "Build complete"
          file rnx2rtkp
          ls -lh rnx2rtkp

      - name: Upload iOS binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnx2rtkp-ios-arm64
          path: rnx2rtkp
          retention-days: 30
