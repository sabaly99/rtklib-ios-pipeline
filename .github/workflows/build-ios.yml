name: Build rnx2rtkp for iOS ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone RTKLIB_EX_2.5.0
        run: |
          git clone --depth=1 https://github.com/rtklibexplorer/RTKLIB.git rtklib
          cd rtklib
          # Checkout the correct branch/tag
          git fetch --tags
          git checkout b34i  # latest demo5 branch; change to exact tag if needed
          echo "RTKLIB cloned successfully"

      - name: Show iOS SDK path
        run: |
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version

     - name: Patch out system() calls incompatible with iOS
        run: |
          # download.c — replace system(cmd) with a stub that returns -1
          sed -i 's/return system(cmd);/return -1; \/* system() unavailable on iOS *\//g' rtklib/src/download.c

          # rtkcmn.c — same fix
          sed -i 's/return system(cmd);/return -1; \/* system() unavailable on iOS *\//g' rtklib/src/rtkcmn.c

          echo "Patched download.c:"
          grep -n "system" rtklib/src/download.c | head -5
          echo "Patched rtkcmn.c:"
          grep -n "system" rtklib/src/rtkcmn.c | head -5

      - name: Compile rnx2rtkp for iOS ARM64
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SRC_DIR=rtklib/src
          MAIN_C=$(find rtklib -name "rnx2rtkp.c" | head -1)
          echo "Main source: $MAIN_C"

          clang \
            -target arm64-apple-ios14.0 \
            -isysroot "$SDK" \
            -O2 \
            -DENAGLO -DENAGAL -DENAQZS -DENACMP -DENAIRN \
            -I"$SRC_DIR" \
            -o rnx2rtkp \
            "$SRC_DIR"/*.c \
            "$MAIN_C" \
            -lm

          echo "Build complete"
          file rnx2rtkp
          ls -lh rnx2rtkp

      - name: Upload iOS binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnx2rtkp-ios-arm64
          path: rnx2rtkp
          retention-days: 30
